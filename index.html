<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTrack — Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4d1c;
    --text: #f0f0f0;
    --muted: #666;
    --present: #00c97a;
    --absent: #ff4d1c;
    --late: #f5a623;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .header-date {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 1rem 1.5rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: var(--border);
  }

  /* CARDS / PANELS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .toolbar input, .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar select option { background: var(--surface2); }

  /* BUTTONS */
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-accent:hover { opacity: 0.85; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--absent); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }

  /* ADD MEMBER FORM */
  .add-form {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .form-group input, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
    border-radius: var(--radius);
    outline: none;
    min-width: 160px;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

  /* MEMBERS TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead tr { border-bottom: 2px solid var(--accent); }
  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.75rem 1rem;
    text-align: left;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 0.75rem 1rem; }

  .badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
  }
  .badge-class { background: #1a2a3a; color: #5ab4ff; }

  .action-btns { display: flex; gap: 0.4rem; }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.delete:hover { color: var(--absent); border-color: var(--absent); }

  /* ATTENDANCE PANEL */
  .att-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .date-picker-wrap {
    display: flex; align-items: center; gap: 0.5rem;
  }
  .date-picker-wrap input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
    border-radius: var(--radius);
    outline: none;
  }
  .date-picker-wrap input[type="date"]:focus { border-color: var(--accent); }

  .class-filter select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
    border-radius: var(--radius);
    outline: none;
  }

  /* ATTENDANCE LIST */
  .att-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .att-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.2s;
    gap: 1rem;
  }
  .att-row.present { border-left: 3px solid var(--present); }
  .att-row.absent { border-left: 3px solid var(--absent); }
  .att-row.late { border-left: 3px solid var(--late); }

  .att-info { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
  .att-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .att-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .att-class { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .status-btns { display: flex; gap: 0.35rem; }
  .status-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    transition: all 0.15s;
  }
  .status-btn:hover { border-color: var(--text); color: var(--text); }
  .status-btn.active-present { background: var(--present); border-color: var(--present); color: #000; }
  .status-btn.active-absent { background: var(--absent); border-color: var(--absent); color: #fff; }
  .status-btn.active-late { background: var(--late); border-color: var(--late); color: #000; }

  .mark-all-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .mark-all-row span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.25rem;
  }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.green::before { background: var(--present); }
  .stat-card.red::before { background: var(--absent); }
  .stat-card.yellow::before { background: var(--accent); }
  .stat-card.orange::before { background: var(--late); }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .stat-label {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* CHART */
  .chart-wrap { position: relative; height: 200px; margin-top: 1rem; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100%; }
  .bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; gap: 4px; }
  .bars { display: flex; gap: 3px; align-items: flex-end; width: 100%; justify-content: center; }
  .bar {
    width: 14px;
    border-radius: 2px 2px 0 0;
    transition: height 0.5s cubic-bezier(.4,0,.2,1);
    min-height: 2px;
  }
  .bar.p { background: var(--present); }
  .bar.a { background: var(--absent); }
  .bar.l { background: var(--late); }
  .bar-label { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 4px; }

  /* MEMBER REPORT */
  .report-filters { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .member-report-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .mrc-name { font-weight: 600; min-width: 140px; }
  .mrc-bar-wrap { flex: 1; min-width: 120px; }
  .mrc-bar-bg {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .mrc-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--present);
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .mrc-pct {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    min-width: 50px;
    text-align: right;
  }
  .mrc-counts { font-size: 0.78rem; color: var(--muted); min-width: 120px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.9rem; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.75rem 1.25rem;
    border-radius: var(--radius);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  .count-pills { display: flex; gap: 0.5rem; }
  .pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
  }
  .pill-p { background: rgba(0,201,122,0.15); color: var(--present); }
  .pill-a { background: rgba(255,77,28,0.15); color: var(--absent); }
  .pill-l { background: rgba(245,166,35,0.15); color: var(--late); }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1rem 0.6rem 2rem;
    border-radius: var(--radius);
    outline: none;
    min-width: 200px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-wrap { position: relative; }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .att-row { flex-direction: column; align-items: flex-start; }
    .status-btns { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Gym<span>Track</span></div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('members')">Members</button>
  <button class="tab-btn" onclick="showTab('attendance')">Attendance</button>
  <button class="tab-btn" onclick="showTab('reports')">Reports</button>
</div>

<main>

  <!-- ============ MEMBERS TAB ============ -->
  <div id="tab-members" class="tab-panel active">
    <div class="section-title">Members</div>
    <div class="card">
      <div class="add-form" id="addMemberForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="newName" placeholder="e.g. Ahmed Hassan" />
        </div>
        <div class="form-group">
          <label>Class</label>
          <select id="newClass">
            <option value="">Select class</option>
          </select>
        </div>
        <div class="form-group">
          <label>New Class Name</label>
          <input type="text" id="newClassName" placeholder="e.g. Yoga Mon/Wed" />
        </div>
        <button class="btn btn-accent" onclick="addMember()">＋ Add Member</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" type="text" id="memberSearch" placeholder="Search members..." oninput="renderMembers()" />
      </div>
      <select onchange="filterByClass(this.value)" id="classFilterMembers" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:0.6rem 1rem;border-radius:var(--radius);outline:none;">
        <option value="">All Classes</option>
      </select>
      <span style="margin-left:auto;font-size:0.8rem;color:var(--muted)" id="memberCount"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Class</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="membersBody"></tbody>
      </table>
    </div>
    <div id="membersEmpty" class="empty-state" style="display:none">
      <div class="icon">🏋️</div>
      <p>No members yet. Add your first member above.</p>
    </div>
  </div>

  <!-- ============ ATTENDANCE TAB ============ -->
  <div id="tab-attendance" class="tab-panel">
    <div class="att-header">
      <div class="section-title" style="margin:0">Take Attendance</div>
      <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
        <div class="class-filter">
          <select id="attClassFilter" onchange="renderAttendance()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:0.6rem 1rem;border-radius:var(--radius);outline:none;">
            <option value="">All Classes</option>
          </select>
        </div>
        <div class="date-picker-wrap">
          <input type="date" id="attDate" onchange="renderAttendance()" />
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div class="mark-all-row">
        <span>Mark All:</span>
        <button class="btn btn-ghost" onclick="markAll('present')">✓ Present</button>
        <button class="btn btn-ghost" onclick="markAll('absent')">✗ Absent</button>
        <button class="btn btn-ghost" onclick="markAll('late')">⏱ Late</button>
        <div style="margin-left:auto" class="count-pills">
          <span class="pill pill-p" id="cntPresent">0 Present</span>
          <span class="pill pill-a" id="cntAbsent">0 Absent</span>
          <span class="pill pill-l" id="cntLate">0 Late</span>
        </div>
      </div>
    </div>

    <div class="att-list" id="attList"></div>
    <div id="attEmpty" class="empty-state" style="display:none">
      <div class="icon">📋</div>
      <p>No members in this class. Add members first.</p>
    </div>
  </div>

  <!-- ============ REPORTS TAB ============ -->
  <div id="tab-reports" class="tab-panel">
    <div class="section-title">Overview</div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="card">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem">Last 7 Days — Attendance Trend</div>
      <div class="chart-wrap">
        <div class="bar-chart" id="barChart"></div>
      </div>
      <div style="display:flex;gap:1rem;margin-top:0.75rem">
        <span style="font-size:0.75rem;color:var(--present)">▪ Present</span>
        <span style="font-size:0.75rem;color:var(--absent)">▪ Absent</span>
        <span style="font-size:0.75rem;color:var(--late)">▪ Late</span>
      </div>
    </div>

    <div class="section-title" style="margin-top:2rem">Member Attendance Rate</div>

    <div class="report-filters">
      <div class="form-group">
        <label>Filter by Class</label>
        <select id="reportClassFilter" onchange="renderReports()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:0.9rem;padding:0.6rem 1rem;border-radius:var(--radius);outline:none;min-width:160px;">
          <option value="">All Classes</option>
        </select>
      </div>
      <button class="btn btn-accent" onclick="exportCSV()" style="margin-top:auto">⬇ Export CSV</button>
    </div>

    <div id="memberReports"></div>
  </div>

</main>

<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  members: [],
  classes: [],
  attendance: {} // { "YYYY-MM-DD": { memberId: "present"|"absent"|"late" } }
};

function save() {
  localStorage.setItem('gymtrack', JSON.stringify(state));
}
function load() {
  const raw = localStorage.getItem('gymtrack');
  if (raw) state = JSON.parse(raw);
  // seed demo data if empty
  if (!state.members.length) seedDemo();
}

function seedDemo() {
  state.classes = ['Morning HIIT', 'Evening Yoga', 'Crossfit'];
  state.members = [
    { id: 1, name: 'Ahmed Hassan', cls: 'Morning HIIT', joined: today() },
    { id: 2, name: 'Sara Ali', cls: 'Morning HIIT', joined: today() },
    { id: 3, name: 'Omar Khaled', cls: 'Evening Yoga', joined: today() },
    { id: 4, name: 'Nour Ibrahim', cls: 'Evening Yoga', joined: today() },
    { id: 5, name: 'Karim Adel', cls: 'Crossfit', joined: today() },
  ];
  save();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2);
}

function avatarColor(name) {
  const colors = ['#5ab4ff','#e8ff00','#ff4d1c','#00c97a','#f5a623','#c97bff','#ff78b4'];
  let h = 0; for(let c of name) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'attendance') renderAttendance();
  if (name === 'reports') renderReports();
}

// ─── CLASSES ─────────────────────────────────────────────────────────────────
function refreshClassDropdowns() {
  const classes = state.classes;
  const selects = ['newClass','attClassFilter','classFilterMembers','reportClassFilter'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    el.innerHTML = `<option value="">All Classes</option>`;
    if (id === 'newClass') el.innerHTML = `<option value="">Select class</option>`;
    classes.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      el.appendChild(opt);
    });
    el.value = cur;
  });
}

// ─── MEMBERS ─────────────────────────────────────────────────────────────────
let memberClassFilter = '';
function filterByClass(val) { memberClassFilter = val; renderMembers(); }

function addMember() {
  const name = document.getElementById('newName').value.trim();
  let cls = document.getElementById('newClass').value;
  const newCls = document.getElementById('newClassName').value.trim();

  if (!name) { toast('Enter a name'); return; }

  if (newCls) {
    if (!state.classes.includes(newCls)) {
      state.classes.push(newCls);
      refreshClassDropdowns();
    }
    cls = newCls;
  }
  if (!cls) { toast('Select or enter a class'); return; }

  const id = Date.now();
  state.members.push({ id, name, cls, joined: today() });
  save();
  document.getElementById('newName').value = '';
  document.getElementById('newClassName').value = '';
  document.getElementById('newClass').value = '';
  renderMembers();
  toast('Member added');
}

function deleteMember(id) {
  if (!confirm('Remove this member?')) return;
  state.members = state.members.filter(m => m.id !== id);
  save();
  renderMembers();
  toast('Member removed');
}

function renderMembers() {
  const search = document.getElementById('memberSearch').value.toLowerCase();
  let members = state.members;
  if (memberClassFilter) members = members.filter(m => m.cls === memberClassFilter);
  if (search) members = members.filter(m => m.name.toLowerCase().includes(search));

  const tbody = document.getElementById('membersBody');
  const empty = document.getElementById('membersEmpty');

  document.getElementById('memberCount').textContent = `${members.length} member${members.length !== 1 ? 's' : ''}`;

  if (!members.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = members.map((m, i) => `
    <tr>
      <td style="color:var(--muted);font-size:0.8rem">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:0.6rem">
          <div style="width:32px;height:32px;border-radius:50%;background:${avatarColor(m.name)}22;color:${avatarColor(m.name)};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.8rem;flex-shrink:0">${initials(m.name)}</div>
          <span style="font-weight:500">${m.name}</span>
        </div>
      </td>
      <td><span class="badge badge-class">${m.cls}</span></td>
      <td style="color:var(--muted);font-size:0.82rem">${m.joined}</td>
      <td>
        <div class="action-btns">
          <button class="icon-btn delete" onclick="deleteMember(${m.id})" title="Remove">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ─── ATTENDANCE ───────────────────────────────────────────────────────────────
function getAttDate() { return document.getElementById('attDate').value; }

function setStatus(memberId, status) {
  const date = getAttDate();
  if (!state.attendance[date]) state.attendance[date] = {};
  state.attendance[date][memberId] = status;
  save();
  updateAttRow(memberId, status);
  updateCounts();
}

function updateAttRow(memberId, status) {
  const row = document.querySelector(`.att-row[data-id="${memberId}"]`);
  if (!row) return;
  row.className = 'att-row ' + status;
  row.querySelectorAll('.status-btn').forEach(b => {
    b.className = 'status-btn';
    if (b.dataset.status === status) b.classList.add('active-' + status);
  });
}

function markAll(status) {
  const date = getAttDate();
  const cls = document.getElementById('attClassFilter').value;
  let members = state.members;
  if (cls) members = members.filter(m => m.cls === cls);
  if (!state.attendance[date]) state.attendance[date] = {};
  members.forEach(m => { state.attendance[date][m.id] = status; });
  save();
  renderAttendance();
  toast('All marked as ' + status);
}

function updateCounts() {
  const date = getAttDate();
  const rec = state.attendance[date] || {};
  const cls = document.getElementById('attClassFilter').value;
  let members = state.members;
  if (cls) members = members.filter(m => m.cls === cls);
  let p=0,a=0,l=0;
  members.forEach(m => {
    const s = rec[m.id];
    if (s === 'present') p++;
    else if (s === 'absent') a++;
    else if (s === 'late') l++;
  });
  document.getElementById('cntPresent').textContent = p + ' Present';
  document.getElementById('cntAbsent').textContent = a + ' Absent';
  document.getElementById('cntLate').textContent = l + ' Late';
}

function renderAttendance() {
  const date = getAttDate();
  const cls = document.getElementById('attClassFilter').value;
  let members = state.members;
  if (cls) members = members.filter(m => m.cls === cls);
  const rec = state.attendance[date] || {};
  const list = document.getElementById('attList');
  const empty = document.getElementById('attEmpty');

  if (!members.length) {
    list.innerHTML = '';
    empty.style.display = '';
    updateCounts();
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = members.map(m => {
    const s = rec[m.id] || '';
    const color = avatarColor(m.name);
    return `
      <div class="att-row ${s}" data-id="${m.id}">
        <div class="att-info">
          <div class="att-avatar" style="background:${color}22;color:${color}">${initials(m.name)}</div>
          <div>
            <div class="att-name">${m.name}</div>
            <div class="att-class">${m.cls}</div>
          </div>
        </div>
        <div class="status-btns">
          <button class="status-btn ${s==='present'?'active-present':''}" data-status="present" onclick="setStatus(${m.id},'present')">✓ Present</button>
          <button class="status-btn ${s==='absent'?'active-absent':''}" data-status="absent" onclick="setStatus(${m.id},'absent')">✗ Absent</button>
          <button class="status-btn ${s==='late'?'active-late':''}" data-status="late" onclick="setStatus(${m.id},'late')">⏱ Late</button>
        </div>
      </div>
    `;
  }).join('');
  updateCounts();
}

// ─── REPORTS ─────────────────────────────────────────────────────────────────
function renderReports() {
  renderStats();
  renderBarChart();
  renderMemberReports();
}

function renderStats() {
  let totalSessions = Object.keys(state.attendance).length;
  let totalPresent=0, totalAbsent=0, totalLate=0;
  Object.values(state.attendance).forEach(day => {
    Object.values(day).forEach(s => {
      if (s==='present') totalPresent++;
      else if (s==='absent') totalAbsent++;
      else if (s==='late') totalLate++;
    });
  });
  const total = totalPresent + totalAbsent + totalLate;
  const rate = total ? Math.round(totalPresent / total * 100) : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card yellow">
      <div class="stat-value">${state.members.length}</div>
      <div class="stat-label">Total Members</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value">${rate}%</div>
      <div class="stat-label">Attendance Rate</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value">${totalPresent}</div>
      <div class="stat-label">Total Present</div>
    </div>
    <div class="stat-card red">
      <div class="stat-value">${totalAbsent}</div>
      <div class="stat-label">Total Absent</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-value">${totalLate}</div>
      <div class="stat-label">Total Late</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-value">${totalSessions}</div>
      <div class="stat-label">Sessions Recorded</div>
    </div>
  `;
}

function renderBarChart() {
  const chart = document.getElementById('barChart');
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }

  const maxVal = days.reduce((mx, day) => {
    const rec = state.attendance[day] || {};
    const vals = Object.values(rec);
    const p = vals.filter(x=>x==='present').length;
    const a = vals.filter(x=>x==='absent').length;
    const l = vals.filter(x=>x==='late').length;
    return Math.max(mx, p+a+l);
  }, 1);

  chart.innerHTML = days.map(day => {
    const rec = state.attendance[day] || {};
    const vals = Object.values(rec);
    const p = vals.filter(x=>x==='present').length;
    const a = vals.filter(x=>x==='absent').length;
    const l = vals.filter(x=>x==='late').length;
    const label = new Date(day + 'T00:00:00').toLocaleDateString('en', {weekday:'short'}).slice(0,3);
    const ph = p ? Math.max(4, Math.round(p/maxVal*150)) : 0;
    const ah = a ? Math.max(4, Math.round(a/maxVal*150)) : 0;
    const lh = l ? Math.max(4, Math.round(l/maxVal*150)) : 0;
    return `
      <div class="bar-group">
        <div class="bars">
          <div class="bar p" style="height:${ph}px" title="${p} present"></div>
          <div class="bar a" style="height:${ah}px" title="${a} absent"></div>
          <div class="bar l" style="height:${lh}px" title="${l} late"></div>
        </div>
        <div class="bar-label">${label}</div>
      </div>
    `;
  }).join('');
}

function renderMemberReports() {
  const cls = document.getElementById('reportClassFilter').value;
  let members = state.members;
  if (cls) members = members.filter(m => m.cls === cls);

  const wrap = document.getElementById('memberReports');
  if (!members.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No members found.</p></div>';
    return;
  }

  const rows = members.map(m => {
    let p=0, a=0, l=0;
    Object.values(state.attendance).forEach(day => {
      const s = day[m.id];
      if (s==='present') p++;
      else if (s==='absent') a++;
      else if (s==='late') l++;
    });
    const total = p+a+l;
    const rate = total ? Math.round(p/total*100) : 0;
    const color = rate >= 75 ? 'var(--present)' : rate >= 50 ? 'var(--late)' : 'var(--absent)';
    return { m, p, a, l, total, rate, color };
  }).sort((x,y) => y.rate - x.rate);

  wrap.innerHTML = rows.map(({m, p, a, l, rate, color}) => `
    <div class="member-report-card">
      <div style="display:flex;align-items:center;gap:0.5rem;min-width:160px">
        <div style="width:32px;height:32px;border-radius:50%;background:${avatarColor(m.name)}22;color:${avatarColor(m.name)};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.8rem;flex-shrink:0">${initials(m.name)}</div>
        <div>
          <div class="mrc-name">${m.name}</div>
          <div style="font-size:0.75rem;color:var(--muted)">${m.cls}</div>
        </div>
      </div>
      <div class="mrc-bar-wrap">
        <div class="mrc-bar-bg">
          <div class="mrc-bar-fill" style="width:${rate}%;background:${color}"></div>
        </div>
      </div>
      <div class="mrc-pct" style="color:${color}">${rate}%</div>
      <div class="mrc-counts">
        <span style="color:var(--present)">✓${p}</span>
        &nbsp;<span style="color:var(--absent)">✗${a}</span>
        &nbsp;<span style="color:var(--late)">⏱${l}</span>
      </div>
    </div>
  `).join('');
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  const dates = Object.keys(state.attendance).sort();
  if (!dates.length) { toast('No attendance data to export'); return; }

  const header = ['Member','Class',...dates,'Attendance Rate'];
  const rows = state.members.map(m => {
    let p=0,tot=0;
    const cells = dates.map(d => {
      const s = (state.attendance[d]||{})[m.id] || '';
      if (s) tot++;
      if (s==='present') p++;
      return s;
    });
    const rate = tot ? (p/tot*100).toFixed(1)+'%' : 'N/A';
    return [m.name, m.cls, ...cells, rate];
  });

  const csv = [header, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'attendance_export.csv';
  a.click();
  toast('CSV exported!');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  load();
  // set today's date
  document.getElementById('attDate').value = today();
  // header date
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  refreshClassDropdowns();
  renderMembers();
}

init();
</script>
