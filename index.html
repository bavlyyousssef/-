<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فريق ايل شداي — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #060606;
  --gold:   #c9a227;
  --gold2:  #f0cd6a;
  --text:   #e8e0d0;
  --muted:  #555;
  --border: #222;
  --s2:     #141414;
  --red:    #e74c3c;
  --r:      5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow: hidden;
  position: relative;
}

/* ── DRAMATIC BACKGROUND ── */
.bg-curtain {
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,162,39,.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 80% at 0% 50%, rgba(201,162,39,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 80% at 100% 50%, rgba(201,162,39,.04) 0%, transparent 60%);
}
.bg-lines {
  position: fixed; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    90deg, transparent, transparent 80px,
    rgba(201,162,39,.012) 80px, rgba(201,162,39,.012) 81px
  );
}
/* stage spotlight */
.spotlight {
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(201,162,39,.06) 0%, transparent 70%);
  pointer-events: none;
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:.6; transform:translateX(-50%) scale(1); }
  50%      { opacity:1;  transform:translateX(-50%) scale(1.08); }
}

/* ── LOGIN BOX ── */
.login-wrap {
  position: relative; z-index: 10;
  width: 100%; max-width: 400px;
  padding: 1.5rem;
  animation: fadeUp .6s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* logo area */
.login-logo-wrap {
  text-align: center;
  margin-bottom: 2rem;
}
.login-logo {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 2px solid rgba(201,162,39,.35);
  object-fit: contain;
  box-shadow: 0 0 30px rgba(201,162,39,.15), 0 0 60px rgba(201,162,39,.05);
  margin-bottom: 1rem;
}
.login-title {
  font-family: 'Amiri', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: .25rem;
}
.login-sub {
  font-size: .75rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* card */
.login-card {
  background: linear-gradient(160deg, #111 0%, #0d0c09 100%);
  border: 1px solid rgba(201,162,39,.2);
  border-radius: 8px;
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(201,162,39,.05);
}

/* top gold line */
.login-card::before {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: -2rem -2rem 1.75rem;
  border-radius: 8px 8px 0 0;
  opacity: .7;
}

.fg { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1.2rem; }
.fg label {
  font-size: .72rem; letter-spacing: 1px; color: var(--muted);
  text-transform: uppercase;
}
.fg input {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: .92rem;
  padding: .7rem 1rem;
  border-radius: var(--r);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  direction: ltr; text-align: right;
  width: 100%;
}
.fg input:focus {
  border-color: rgba(201,162,39,.5);
  box-shadow: 0 0 0 3px rgba(201,162,39,.07);
}
.fg input.error { border-color: var(--red) !important; }

.login-btn {
  width: 100%;
  background: var(--gold);
  color: #000;
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: .95rem;
  letter-spacing: .5px;
  padding: .75rem;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  margin-top: .5rem;
  transition: opacity .2s, transform .1s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center; gap: .5rem;
}
.login-btn:hover { opacity: .88; box-shadow: 0 4px 20px rgba(201,162,39,.3); }
.login-btn:active { transform: scale(.98); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }

/* error message */
.err-msg {
  font-size: .8rem;
  color: var(--red);
  text-align: center;
  margin-top: 1rem;
  min-height: 1.2rem;
  opacity: 0;
  transition: opacity .25s;
}
.err-msg.show { opacity: 1; }

/* loading spinner inside btn */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-btn.loading .spinner { display: block; }
.login-btn.loading .btn-text { display: none; }

/* connecting overlay */
#connectingMsg {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1rem;
}
#connectingMsg .big-spinner {
  width: 36px; height: 36px;
  border: 3px solid #222;
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
#connectingMsg p { font-size: .84rem; color: var(--muted); }

/* decorative masks */
.deco-masks {
  position: fixed; bottom: -20px; right: -30px;
  font-size: 9rem; opacity: .025; pointer-events: none;
  transform: rotate(-15deg);
  user-select: none;
}
.deco-masks2 {
  position: fixed; top: -10px; left: -20px;
  font-size: 7rem; opacity: .02; pointer-events: none;
  transform: rotate(20deg);
  user-select: none;
}
</style>
</head>
<body>

<div class="bg-curtain"></div>
<div class="bg-lines"></div>
<div class="spotlight"></div>
<div class="deco-masks">🎭</div>
<div class="deco-masks2">🎭</div>

<!-- Connecting overlay -->
<div id="connectingMsg">
  <div class="big-spinner"></div>
  <p>جاري الاتصال…</p>
</div>

<div class="login-wrap">
  <div class="login-logo-wrap">
    <img class="login-logo" id="teamLogo" src="" alt="شعار الفريق" />
    <div class="login-title">فريق ايل شداي المسرحي</div>
    <div class="login-sub">نظام سجل الحضور</div>
  </div>

  <div class="login-card">
    <div class="fg">
      <label>اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" />
    </div>
    <div class="fg">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" />
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">دخول ←</span>
    </button>

    <div class="err-msg" id="errMsg">اسم المستخدم أو كلمة المرور غلط</div>
  </div>
</div>

<!-- Firebase (module) -->
<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { firebaseConfig, CREDENTIALS_PATH } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Check if already logged in
if (sessionStorage.getItem('shadai_auth') === 'true') {
  window.location.href = 'app.html';
}

// Hide connecting overlay once ready
document.getElementById('connectingMsg').style.display = 'none';

// Allow Enter key
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

window.doLogin = async function() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errMsg   = document.getElementById('errMsg');

  errMsg.classList.remove('show');
  ['username','password'].forEach(id => document.getElementById(id).classList.remove('error'));

  if (!username || !password) {
    errMsg.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
    errMsg.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const snap = await get(ref(db, CREDENTIALS_PATH));
    if (!snap.exists()) {
      errMsg.textContent = 'لم يتم إعداد بيانات الدخول في Firebase بعد';
      errMsg.classList.add('show');
      return;
    }
    const creds = snap.val();
    if (username === creds.username && password === creds.password) {
      sessionStorage.setItem('shadai_auth', 'true');
      sessionStorage.setItem('shadai_user', username);
      window.location.href = 'app.html';
    } else {
      errMsg.textContent = 'اسم المستخدم أو كلمة المرور غلط';
      errMsg.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      document.getElementById('password').value = '';
    }
  } catch (err) {
    errMsg.textContent = 'خطأ في الاتصال — تحقق من إعدادات Firebase';
    errMsg.classList.add('show');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
};
</script>
